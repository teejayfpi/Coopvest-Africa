name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
      - 'devin/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build APK (${{ github.event.inputs.build_type || 'release' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run code generation (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Set up release keystore
        if: ${{ github.event.inputs.build_type != 'debug' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/keystore/release-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=keystore/release-keystore.jks
          storePassword=$KEY_STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Build release APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-${BUILD_TYPE}.apk \
             dist/coopvest-africa-${BUILD_TYPE}-${VERSION}-${SHORT_SHA}.apk
          echo "APK_PATH=dist/coopvest-africa-${BUILD_TYPE}-${VERSION}-${SHORT_SHA}.apk" >> $GITHUB_ENV
          echo "APK_NAME=coopvest-africa-${BUILD_TYPE}-${VERSION}-${SHORT_SHA}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build summary
        run: |
          echo "## Build Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`${{ env.APK_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build type | ${{ github.event.inputs.build_type || 'release' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flutter | ${{ env.FLUTTER_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the APK from the **Artifacts** section of this workflow run." >> $GITHUB_STEP_SUMMARY
