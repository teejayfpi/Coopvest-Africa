name: Build Flutter APK

on:
  push:
    branches:
      - main
      - master
      - 'devin/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build APK (${{ github.event.inputs.build_type || 'release' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run code generation (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Set up release keystore
        if: ${{ github.event.inputs.build_type != 'debug' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p android/keystore
          rm -f android/keystore/release-keystore.jks
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using keystore from repository secrets..."
            echo "$KEYSTORE_BASE64" | base64 --decode > android/keystore/release-keystore.jks
            STORE_PASS="$KEY_STORE_PASSWORD"
            ALIAS_NAME="$KEY_ALIAS"
            KEY_PASS_VAL="$KEY_PASSWORD"
          else
            echo "No KEYSTORE_BASE64 secret found. Generating a temporary CI keystore..."
            keytool -genkey -v \
              -keystore android/keystore/release-keystore.jks \
              -alias coopvest \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass coopvest_ci_2024 \
              -keypass coopvest_ci_2024 \
              -dname "CN=CoopVest CI Build, OU=Mobile, O=CoopVest Africa, L=Lagos, ST=Lagos, C=NG" \
              -storetype JKS
            STORE_PASS="coopvest_ci_2024"
            ALIAS_NAME="coopvest"
            KEY_PASS_VAL="coopvest_ci_2024"
          fi
          cat > android/key.properties << EOF
          storeFile=keystore/release-keystore.jks
          storePassword=$STORE_PASS
          keyAlias=$ALIAS_NAME
          keyPassword=$KEY_PASS_VAL
          EOF

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Build release APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        if: ${{ github.event.inputs.build_type != 'debug' }}
        run: |
          APK_PATH=$(find build/app/outputs/flutter-apk -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "coopvest-release-$(date +%Y%m%d-%H%M%S).apk"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: ${{ github.event.inputs.build_type != 'debug' }}
        with:
          name: coopvest-release-apk
          path: "*.apk"
          retention-days: 30

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: "*.apk"

      - name: Build summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build type: ${{ github.event.inputs.build_type || 'release' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Flutter version: ${{ env.FLUTTER_VERSION }}" >> $GITHUB_STEP_SUMMARY
