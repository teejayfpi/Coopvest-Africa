# Supabase Configuration
# https://supabase.com/docs/guides/self-hosting

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Site URL
site_url = "https://coopvest-admin.vercel.app"
# Additional URLs
additional_redirect_urls = ["https://coopvest-admin.vercel.app"]
# JWT Expiry
jwt_expiry = 3600
# Enable email autocomfirmation
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Uncomment to enable auto functionality
[Edge Functions]
enabled = true
