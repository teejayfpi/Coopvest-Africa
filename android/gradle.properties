org.gradle.jvmargs=-Xmx4096m
android.useAndroidX=true
android.enableJetifier=true
android.compileSdkVersion=36
android.minSdkVersion=24
android.targetSdkVersion=36
android.ndkVersion=27.0.12077973
# Kotlin compiler settings for compatibility
kotlin.jvm.target=17
# Enable incremental compilation
org.gradle.parallel=true
org.gradle.workers.max=4
# Force Gradle to clear caches and rebuild
org.gradle.caching=false
# Disable Gradle daemon to ensure clean builds
org.gradle.daemon=false
# Maven repository mirrors
systemProp.http.proxyHost=
systemProp.https.proxyHost=
# Aliyun Maven mirrors as fallback
maven.repo.remote=https://maven.aliyun.com/repository/public,https://maven.aliyun.com/repository/gradle-plugin